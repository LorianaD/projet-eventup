name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install server dependencies
        run: |
          if [ -f server/package.json ]; then
            cd server
            npm ci
            cd ..
          fi

      - name: Install client dependencies
        run: |
          if [ -f client/package.json ]; then
            cd client
            npm ci
            cd ..
          fi

      - name: Build client (Vite)
        if: always()
        env:
          # Inject the secret stored in GitHub Actions as VITE_API_URL for build-time (Vite injects VITE_* at build)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -f client/package.json ]; then
            cd client
            npm run build
            cd ..
          else
            echo "No client found"
          fi

      - name: Run server tests (optional)
        run: |
          if [ -f server/package.json ]; then
            cd server
            if npm test --silent; then
              echo "Tests passed"
            else
              echo "Tests failed (if you don't have tests, ignore this step)"
            fi
            cd ..
          fi

      - name: Upload client build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist