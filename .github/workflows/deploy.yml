name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          # Indiquer où trouver les lockfiles (glob) pour que le cache fonctionne
          cache-dependency-path: '**/package-lock.json'

      - name: Afficher l'arborescence (debug léger)
        run: |
          echo "=== racine ==="
          ls -la
          echo "=== back ==="
          if [ -d back ]; then ls -la back || true; else echo "pas de dossier back"; fi
          echo "=== front ==="
          if [ -d front ]; then ls -la front || true; else echo "pas de dossier front"; fi

      - name: Install server (back) dependencies
        run: |
          if [ -f back/package.json ]; then
            cd back
            # npm ci utilise package-lock.json ; si absent fallback à npm install
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm ci
            else
              npm install
            fi
            cd ..
          else
            echo "Aucun package.json dans back"
          fi

      - name: Install client (front) dependencies
        run: |
          if [ -f front/package.json ]; then
            cd front
            if [ -f package-lock.json ] || [ -f yarn.lock ]; then
              npm ci
            else
              npm install
            fi
            cd ..
          else
            echo "Aucun package.json dans front"
          fi

      - name: Build client (Vite)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -f front/package.json ]; then
            cd front
            npm run build
            cd ..
          else
            echo "Aucun front à builder"
          fi

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: front/dist